name: Feature request
description: Suggest a focused product or developer-experience improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Explain the user need before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe what success would look like.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Suggested approach
      description: Optional implementation or design ideas.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workarounds or other approaches you evaluated.
